services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: norn-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: norn
      CLICKHOUSE_USER: norn
      CLICKHOUSE_PASSWORD: norn
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse

volumes:
  clickhouse-data: {}
