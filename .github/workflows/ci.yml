name: CI

on:
  push:
    branches: [main, stg, dev]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        ports:
          - 8123:8123
        env:
          CLICKHOUSE_USER: norn
          CLICKHOUSE_PASSWORD: norn
          # conftest bootstraps norn_test itself; pre-creating it keeps CI and
          # the DSN below telling the same story
          CLICKHOUSE_DB: norn_test
          # conftest bootstraps its own norn_test DB via the default DB
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        options: >-
          --health-cmd "wget -qO- http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install workspace
        run: uv sync --all-packages

      - name: Run tests with coverage
        env:
          NORN_CLICKHOUSE_URL: http://norn:norn@localhost:8123/norn_test
        # coverage threshold per repo testing policy (minimum 80%)
        run: uv run pytest -q --cov-fail-under=80
