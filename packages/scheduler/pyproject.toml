[project]
name = "norn-scheduler"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "norn-core",
    "norn-forecast",
    "norn-agent",
    "apscheduler>=3.10,<4",
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/norn_scheduler"]
