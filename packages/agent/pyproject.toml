[project]
name = "norn-agent"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "norn-core",
    "norn-integration",
    "numpy>=1.26",
    "scipy>=1.11",
    "statsmodels>=0.14",
    "pydantic-ai>=1.104,<2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/norn_agent"]
