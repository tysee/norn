# config/mcp.yml
# Параметры MCP-сервера платформы norn: адрес, на котором поднимается streamable-http
# сервер, через который агенты запрашивают прогнозы и зависимости из контракта.

host: 127.0.0.1   # интерфейс, на котором слушает MCP-сервер (127.0.0.1 — только локально)
port: 9200        # TCP-порт MCP-сервера
