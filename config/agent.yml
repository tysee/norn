# config/agent.yml
# Параметры подсистемы анализа зависимостей платформы norn: какая LLM формирует
# объяснение, как глубоко искать lead/lag-связи и какими статистическими методами.
# Ключи к LLM-провайдеру сюда не кладутся — они переопределяются через переменные окружения.

# LLM-провайдер dependency-агента. Дефолт — локальная Ollama (без облачных креденшелов).
# Секреты — ТОЛЬКО в env: openai-api->OPENAI_API_KEY; openai-oauth->NORN_OPENAI_OAUTH_TOKEN;
#                         openrouter->OPENROUTER_API_KEY; anthropic-api->ANTHROPIC_API_KEY; ollama->нет.
provider: ollama
model: gemma3n:e2b   # openai-api: gpt-4o-mini | openrouter: anthropic/claude-sonnet-4-5 | anthropic-api: claude-sonnet-4-5
base_url: null       # ollama default http://localhost:11434/v1 (в коде); или свой openai-compat endpoint
max_lag: 10                            # максимальный сдвиг (lag), в шагах ряда, проверяемый при поиске связей
context_length: 512                    # длина исторического окна (число точек), подаваемого в анализ
methods: [lagged_cross_correlation, granger]  # статистические методы оценки зависимостей
granger_min_points_factor: 3           # множитель: минимум точек для теста Грейнджера = factor * max_lag
# доля значимости Granger: p-value ниже -> зависимость считается значимой (source_leads)
granger_significance: 0.05
