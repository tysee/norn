# config/forecast.yml
# Параметры подсистемы прогноза платформы norn: значения по умолчанию для job'ов,
# набор квантилей прогноза, настройки воркера модели TimesFM и параметры калибровки.
# Значения здесь — дефолты платформы; конкретный job-YAML может их переопределять.

# Дефолты прогноза, применяемые если job их не задаёт.
defaults:
  horizon: 30          # глубина прогноза вперёд, в шагах ряда
  context_length: 512  # длина исторического окна (число точек), подаваемого модели
  seasonality: 7       # период сезонности ряда, в шагах (напр. 7 = недельная)

# Квантили прогноза: нижняя/медиана/верхняя — формируют интервалы неопределённости.
quantiles: [0.1, 0.5, 0.9]

# Настройки внешнего воркера модели TimesFM.
timesfm:
  worker_url: "http://localhost:9100"  # URL HTTP-воркера, выполняющего инференс TimesFM
  max_context: 1024                     # верхний предел длины контекста, принимаемой моделью
  max_horizon: 1024                     # верхний предел глубины прогноза модели

# Параметры rolling-origin калибровки.
calibration:
  n_cutoffs: 3   # число точек отсечения (origin'ов) для оценки качества прогноза
