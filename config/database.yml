# config/database.yml
# Connection parameters for the ClickHouse store — the norn platform's local sidecar,
# where contract rows (forecasts, calibration, dependencies) are written.
# Secrets (password, etc.) are not placed here: they are overridden via environment variables.

host: localhost   # ClickHouse host; for the local sidecar — localhost
port: 8123        # ClickHouse HTTP port (native HTTP interface)
user: norn        # DB username
database: norn    # name of the database where the contract schema lives
secure: false     # whether to use a TLS connection (true for a secured connection)
# Ownership of the contract tables schema:
#   true  — norn idempotently creates its contract tables in its DB (zero-setup).
#   false — norn does NOT run DDL (INSERT only); create the tables via your own dbt/migrations,
#           the canonical DDL is printed by `norn print-schema`. The DB role then has no CREATE rights.
manage_schema: true
# password: taken from env NORN_DB_PASSWORD (secret, not in YAML)
